# Codemagic CI/CD for iron-citadel
workflows:
  ios-workflow:
    name: iOS
    max_build_duration: 60
    environment:
      vars:
        XCODE_VERSION: "16.0"
        APP_NAME: "iron-citadel"
    triggering:
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - git clone https://github.com/mattypatty918-wq/tower-defense-101.git --depth 1
      - cd tower-defense-101 && git submodule update --init --recursive
      - cd tower-defense-101 && xcode-project fetch-dependencies --use-cache
      - cd tower-defense-101 && xcode-project build --workspace  --scheme  --configuration Release
    artifacts:
      - tower-defense-101/ios/*.ipa
    publishing:
      app_store_connect:
        api_key: Whitefoxes
